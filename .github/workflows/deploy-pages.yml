name: Deploy birthday fun!

on:
  push:
    branches:
      - event
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    environment: github-pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Print deploy env (masked)
        env:
          VITE_EVENT_ADDRESS: ${{ secrets.VITE_EVENT_ADDRESS }}
          VITE_EVENT_CONTACT_EMAIL: ${{ secrets.VITE_EVENT_CONTACT_EMAIL }}
          VITE_EVENT_CONTACT_PHONE: ${{ secrets.VITE_EVENT_CONTACT_PHONE }}
        run: npm run deploy:env

      - name: Build for GitHub Pages
        env:
          VITE_EVENT_ADDRESS: ${{ secrets.VITE_EVENT_ADDRESS }}
          VITE_EVENT_CONTACT_EMAIL: ${{ secrets.VITE_EVENT_CONTACT_EMAIL }}
          VITE_EVENT_CONTACT_PHONE: ${{ secrets.VITE_EVENT_CONTACT_PHONE }}
        run: npm run build:pages

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
